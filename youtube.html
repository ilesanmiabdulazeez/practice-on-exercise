<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>youtube.com clone</title>

</head>
<style>
    .thumbnail{
    width: 300px;
    display: block;
    
    }

    .search-bar{
        display:block;


    }

    .video-title{
        width: 300px;

    }

    .video-preview{
        width: 300px;
        display: inline-block;
        vertical-align: top;
        margin-right: 15px;

    }

    .video-author{
        display: inline-block;

    }

    .video-stats{
        display: inline-block;

    }

    
</style>
<body>
    
    
       <input class='search-bar' type='text' placeholder='search'>
        <div class='video-preview'>

        Talking Tech <strong>and AI with </strong> Google CEO Sundar Pichai!

    </p>

    </p>

    3.4 views &middot; 6 month ago
     </p>
    </div>


    <div class='video-preview'>
